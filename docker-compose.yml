version: '3.8'

services:
  sonarr-missing-search:
    build:
      context: .
      dockerfile: Dockerfile
    image: agreenbhm/sonarr-missing-search:latest
    container_name: sonarr-missing-search
    environment:
      - SONARR_URL=http://sonarr:8989  # Internal docker network URL to Sonarr
      - SONARR_API_KEY=YOUR_API_KEY_HERE
      - DAYS_BACK=7
    restart: unless-stopped
    # If your Sonarr is on a specific custom Docker network, attach this container to it:
    # networks:
    #   - your_media_network

# networks:
#   your_media_network:
#     external: true
